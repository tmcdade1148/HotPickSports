name: CI

# Runs on every PR into main and on pushes to main. Spins up a fresh
# machine, installs dependencies, then runs the two fast, deterministic
# checks: a full TypeScript typecheck and the locked lexicon test.
#
# workflow_dispatch allows running the checks on demand from the Actions tab
# (pick any branch). Useful when a PR opened by an automation/integration token
# doesn't auto-trigger the pull_request run. Note: the manual "Run workflow"
# button only appears once this trigger is present on the default branch.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  checks:
    name: Typecheck + tests + lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Tests (full jest suite)
        run: npx jest --ci

      # Hard gate: blocks on eslint ERRORS (e.g. react-hooks/rules-of-hooks,
      # no-undef). Hygiene/advisory rules (no-unused-vars, exhaustive-deps) are
      # configured as warnings, so they're visible but don't fail the build.
      # Deno edge functions are excluded via .eslintignore.
      - name: Lint
        run: npx eslint .
