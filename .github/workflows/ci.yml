name: CI

# Runs on every PR into main and on pushes to main. Spins up a fresh
# machine, installs dependencies, then runs the fast, deterministic checks:
# a full TypeScript typecheck, the Jest suite (incl. the locked lexicon test),
# ESLint, and the Home Screen copy <-> Operator Console drift guard.
#
# workflow_dispatch allows running the checks on demand from the Actions tab
# (pick any branch). Useful when a PR opened by an automation/integration token
# doesn't auto-trigger the pull_request run. Note: the manual "Run workflow"
# button only appears once this trigger is present on the default branch.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  checks:
    name: Typecheck + tests + lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Tests (full jest suite)
        run: npx jest --ci

      # Hard gate: blocks on eslint ERRORS (e.g. react-hooks/rules-of-hooks,
      # no-undef). Hygiene/advisory rules (no-unused-vars, exhaustive-deps) are
      # configured as warnings, so they're visible but don't fail the build.
      # Deno edge functions are excluded via .eslintignore.
      - name: Lint
        run: npx eslint .

      # Doc-sync guard: the Operator Console (tools/hotpick-operator-console_v2.html)
      # hand-mirrors the app's Home Screen copy. Fails if a salutation/headline the
      # console shows no longer exists in src/shell/components/home/* (drift).
      # Zero-dependency Node script — see tools/check-home-spec-sync.mjs.
      - name: Home Screen copy sync (console <-> app)
        run: node tools/check-home-spec-sync.mjs
