name: CI

# Runs on every PR into main and on pushes to main. Spins up a fresh
# machine, installs dependencies, then runs the two fast, deterministic
# checks: a full TypeScript typecheck and the locked lexicon test.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: Typecheck + lexicon test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lexicon test (locks user-facing vocabulary)
        run: npx jest __tests__/lexicon.test.ts
