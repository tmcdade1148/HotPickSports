<!--
  HotPick Sports — Operator Console · Phase 1 (Read-Only Monitor)
  Spec: 260612_HotPick_OperatorConsole_Phase1_Spec

  WHAT THIS IS
    A single self-contained file Tom (super-admin) opens locally in a browser.
    It logs in with email/password via the PUBLISHABLE anon key, gets a scoped
    session JWT, and reads competition state THROUGH RLS as his super-admin user.

  SECURITY (non-negotiable — see CLAUDE.md + spec §7)
    - No service_role key, no sb_secret, no cron secret. Ever. Reads go through
      the super-admin session JWT + existing RLS policies.
    - Session lives in a JS variable only (memory). persistSession:false — no
      localStorage / sessionStorage. Closing or refreshing the tab => re-login.
    - Phase 1 has ZERO writes and calls ZERO Edge Functions. Write controls,
      step buttons, reset, and auto-pick are Phase 2 (separate spec + file).
    - The anon/publishable key below is public by design (already shipped in
      src/shared/config/supabase.ts). It is NOT a secret.
-->

<script>
'use strict';

// ───────────────────────────────────────────────────────────────────────────
// Config
// ───────────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://mzqtrpdiqhopjmxjccwy.supabase.co';
// Publishable (anon) key — public by design, already shipped in
// src/shared/config/supabase.ts. NOT a secret. No service_role key here, ever.
const SUPABASE_ANON_KEY = 'sb_publishable_AaENLNqjJ8jNVHGdTGhOnA_WnHze2CH';

// Session is held in the client's memory only (persistSession:false). Refreshing
// the tab discards it and forces re-login — see spec "Login session not persisted".
// autoRefreshToken:true keeps the in-memory access token renewed so a long
// operator session doesn't expire mid-action (sim-operator would otherwise
// reject the stale JWT with "Not authenticated").
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: false, autoRefreshToken: true, detectSessionInUrl: false },
});

// Write-tier classification — DISPLAY ONLY in Phase 1. (Phase 2 enforces the
// real allowlist server-side in the sim-operator Edge Function.) The badge tells
// Tom which competitions WILL be writeable later, and flags production red.
const WRITE_TIER = {
  nfl_2025_sim:  { tier: 'green', label: 'SANDBOX' },
  nfl_demo:      { tier: 'green', label: 'SANDBOX' },
  nfl_2025_simA: { tier: 'amber', label: 'REVIEWER (Apple)' },
  nfl_2025_simG: { tier: 'amber', label: 'REVIEWER (Google)' },
  nfl_2026:      { tier: 'red',   label: 'PRODUCTION · READ-ONLY' },
};
function writeTier(comp) {
  return WRITE_TIER[comp] || { tier: 'grey', label: 'READ-ONLY' };
}

// Reviewer environments are anchored at Week 8 / picks_open. These are CONSTANTS,
// not config — they are the known-stable state the sandboxes are pinned to.
const REVIEWER_ANCHOR = { week: 8, week_state: 'picks_open' };
const REVIEWER_ENVS = [
  { comp: 'nfl_2025_simA', label: 'nfl_2025_simA (Apple)' },
  { comp: 'nfl_2025_simG', label: 'nfl_2025_simG (Google)' },
];

const WEEKLY_CYCLE_PHASES = ['REGULAR', 'PLAYOFFS', 'SUPERBOWL'];

// Phase 2 — write layer. The server-side sim-operator allowlist is authoritative;
// this client copy only drives the UI (which controls render / enable).
const SIM_ALLOWLIST = ['nfl_2025_sim', 'nfl_2025_simA', 'nfl_2025_simG', 'nfl_demo'];
const REVIEWER_COMPS = ['nfl_2025_simA', 'nfl_2025_simG'];
const PHASE_SEQUENCE = ['OFF_SEASON', 'PRE_SEASON', 'REGULAR', 'REGULAR_COMPLETE', 'PLAYOFFS', 'SUPERBOWL_INTRO', 'SUPERBOWL', 'SEASON_COMPLETE'];
function isWritable(comp) { return SIM_ALLOWLIST.includes(comp); }

// ── Seed Bots (260630_HotPick_SeedBots_Spec) ────────────────────────────────
// The 8 sandbox bots (UUIDs match sim-operator SEED_BOTS / sim-runner FAKE_MEMBERS).
// The server hard-locks the targets to these UUIDs + nfl_2025_sim; this list only
// labels the per-bot control rows. Seeding is offered ONLY for nfl_2025_sim.
const SEED_BOTS_COMP = 'nfl_2025_sim';
const SEED_BOTS_UI = [
  { id: '11111111-1111-4111-8111-000000000001', name: 'The Gunslinger' },
  { id: '11111111-1111-4111-8111-000000000002', name: 'Salty Sarah' },
  { id: '11111111-1111-4111-8111-000000000003', name: 'DSmiley' },

// NFL kickoff slots ("waves") — mirrors sim-operator detectWave + tools/sim-runner.mjs,
// including the Sunday-morning international slot ("sunday_am") so this ladder lines
// up with what advance_game_day actually walks.
const WAVE_ORDER = ['thursday', 'sunday_am', 'sunday1', 'sunday4', 'snf', 'mnf', 'other'];
const WAVE_LABEL = { thursday: 'Thursday', sunday_am: 'Sunday AM', sunday1: 'Sunday 1pm', sunday4: 'Sunday 4pm', snf: 'SNF', mnf: 'MNF', other: 'Other slot' };
function detectWave(kickoffAt) {
  if (!kickoffAt) return 'other';
  const d = new Date(kickoffAt), day = d.getUTCDay(), hour = d.getUTCHours();
  if (day === 4 && hour >= 17) return 'thursday';
  if (day === 5 && hour < 4) return 'thursday';
  // Sunday-morning international game (~9:30am ET / 13:30 UTC) kicks off before
  // the 1pm slate — matches sim-operator so the wave ladder ordering is correct.
  if (day === 0 && hour >= 4 && hour < 17) return 'sunday_am';
  if (day === 0 && hour >= 17 && hour < 20) return 'sunday1';
  if (day === 0 && hour >= 20 && hour < 23) return 'sunday4';
  if (day === 0 && hour >= 23) return 'snf';
  if (day === 1 && hour < 4) return 'snf';
  if (day === 1 && hour >= 17) return 'mnf';
  if (day === 2 && hour < 4) return 'mnf';
  if (day === 5 || day === 6) return 'sunday1';
  return 'other';
}
const gameStatusClass = (s) => { s = normStatus(s); return s.includes('final') ? 'final' : s.includes('progress') ? 'live' : 'scheduled'; };

function log(msg, level = '') {

// Translate internal Supabase/Postgres errors into friendly UI strings.
// Raw error is logged to the devtools console for debugging — never shown raw.
function translateError(err) {
  const raw = (err && (err.message || err.error_description || String(err))) || 'Unknown error';
  console.error('[operator-console]', err);
  const m = raw.toLowerCase();
  if (m.includes('invalid login') || m.includes('invalid_grant') || m.includes('credentials')) return 'Invalid credentials';
  if (m.includes('jwt') || m.includes('expired') || m.includes('token')) return 'Session expired — please log in again';
  if (m.includes('permission') || m.includes('rls') || m.includes('row-level') || m.includes('not authorized')) return 'Permission denied — this account may not have super-admin read access';
  if (m.includes('failed to fetch') || m.includes('network')) return 'Connection error — check your internet connection';
  return 'Something went wrong — see browser console for details';
}

function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 0) return '';
  if (s < 60) return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}
function cfg(key, fallback = null) {
  const row = lastConfig[key];
  return row && row.value !== undefined ? row.value : fallback;
}
function normStatus(s) { return (s || '').toLowerCase(); }

// Game-day wave ladder — the kickoff + final sub-steps the live window walks
// through, derived from the current week's games (lastGames). Display ONLY: the
// engine (sim-operator advance_game_day) is strictly sequential, so status is
// read from the live game rows, never written here. Shared by the timeline and
// the controls so both show the same ladder the single NEXT button walks.
//   curKey = the one sub-step NEXT will run next — computed exactly like
//   gameDayNextLabel(): finish the live wave first, else kick off the next
//   scheduled wave (null => nothing on the clock, or everything is final).
function waveLadder() {
  const games = lastGames || [];
  const waves = WAVE_ORDER.filter(w => games.some(g => detectWave(g.kickoff_at) === w));
  const liveWave  = waves.find(w => games.some(g => detectWave(g.kickoff_at) === w && gameStatusClass(g.status) === 'live'));
  const schedWave = waves.find(w => games.some(g => detectWave(g.kickoff_at) === w && gameStatusClass(g.status) === 'scheduled'));
  const curKey = liveWave ? `${liveWave}:final` : schedWave ? `${schedWave}:kickoff` : null;

  const steps = [];
  for (const w of waves) {
    const wg = games.filter(g => detectWave(g.kickoff_at) === w);
    const started  = wg.some(g => gameStatusClass(g.status) !== 'scheduled'); // kicked off
    const allFinal = wg.every(g => gameStatusClass(g.status) === 'final');
    steps.push({ key: `${w}:kickoff`, label: `${WAVE_LABEL[w]} — kickoff`, done: started });
    steps.push({ key: `${w}:final`,   label: `${WAVE_LABEL[w]} — final`,   done: allFinal });
  }
  return { steps, curKey };
}

function renderTimeline(ws, r) {
  // Readiness stages (prep pipeline) then the in-week walk. The live window is
  // expanded into the per-wave game-day ladder (kickoff/final). PAST -> green ✓,
  // CURRENT -> "you are here", FUTURE -> grey ○. Nothing not-yet-reached is green.
  const okR = (s) => normStatus(s) === 'ok';
  const hasR = !!r;
  const WS_POS = { picks_open: 1, locked: 2, live: 3, settling: 4, complete: 5 };
  const curPos = WS_POS[ws] || 0; // 0 = idle / off-cycle
  const at = stateAt('week_state');

  const readiness = [
    { label: 'Games imported', ok: hasR && okR(r.games_status), at: r && r.games_at },
    { label: 'Odds fetched',   ok: hasR && okR(r.odds_status),  at: r && r.odds_at },
    { label: 'Ranks frozen',   ok: hasR && okR(r.ranks_status), at: r && r.ranks_at },
  ];
  const row = (cls, icon, label, elapsed) =>
    `<div class="checkpoint ${cls}"><span class="cp-icon">${icon}</span><span class="cp-label">${label}</span><span class="cp-elapsed">${elapsed || ''}</span></div>`;
  // Macro week-state row: done if we're past it, current if we're on it.
  const macro = (label, pos) =>
    curPos === 0 ? row('pending', '○', label, '')
    : pos < curPos ? row('done', '✓', label, '')
    : pos === curPos ? row('current', '▶', label, at ? timeAgo(at) : '')
    : row('pending', '○', label, '');

  let html = '';
  for (const s of readiness) {
    html += s.ok ? row('done', '✓', s.label, s.at ? timeAgo(s.at) : '')
                 : row('pending', hasR ? '○' : '–', s.label, '');
  }

  html += macro('Picks open · picks_open', 1);
  html += macro('Picks locked (preview only) · locked', 2);
  // 'locked' is the app's pencils-down beat (the board freezes), NOT a per-pick
  // lock. The real locks land per game at each kickoff in the wave ladder below.
  html += `<div class="cp-note">App freezes the board in this beat, but picks lock per game at each kickoff below — near-instant in production.</div>`;

  // Live window = the game-day wave ladder. Only the wave on the clock lights up,
  // and only once we're actually live; at locked it previews as all-pending.
  const { steps, curKey } = waveLadder();
  if (steps.length) {
    for (const st of steps) {
      if (st.done) html += row('done', '✓', st.label, '');
      else if (ws === 'live' && st.key === curKey) html += row('current', '▶', st.label, at ? timeAgo(at) : '');
      else html += row('pending', '○', st.label, '');
    }
  } else {
    html += macro('Live · live', 3); // games not loaded yet — fall back to one row
  }

  html += macro('Scores settling · settling', 4);
  html += macro('Week complete · complete', 5);

  document.getElementById('checkpoint-list').innerHTML = html;
}
function stateAt(key) { return lastConfig[key] && lastConfig[key].updated_at; }

// ---- Games view ----
async function renderGames() {
  const week = cfg('current_week');
  const el = document.getElementById('games-view');
  const t = writeTier(selectedComp);
  document.getElementById('games-title').textContent =
    `Games — Week ${week ?? '—'}` + (t.tier === 'red' ? '  ·  PRODUCTION' : '');
  if (typeof week !== 'number') { el.innerHTML = `<div class="empty">No current week set.</div>`; return; }

  const { data, error } = await sb
    .from('season_games')
    .select('game_id, away_team, home_team, away_score, home_score, status, rank, frozen_rank, kickoff_at')
    .eq('competition', selectedComp).eq('week', week)
    .order('kickoff_at', { nullsFirst: false }).order('rank', { ascending: true, nullsFirst: false });
  if (error) { el.innerHTML = `<div class="empty">${translateError(error)}</div>`; lastGames = []; return; }
  const games = data || [];
  lastGames = games;
  if (!games.length) { el.innerHTML = `<div class="empty">No games for week ${week}.</div>`; return; }

  // The wave currently "on the clock" (live wave, else the next scheduled wave) —
  // highlighted so progress through game day is obvious.
  const liveWave = WAVE_ORDER.find(w => games.some(g => detectWave(g.kickoff_at) === w && gameStatusClass(g.status) === 'live'));
  const nextSched = WAVE_ORDER.find(w => games.some(g => detectWave(g.kickoff_at) === w && gameStatusClass(g.status) === 'scheduled'));
  const activeWave = liveWave || nextSched;

  const gameRow = (g) => {
    const stCls = `st-${gameStatusClass(g.status) === 'live' ? 'in_progress' : gameStatusClass(g.status)}`;
    const fr = (g.frozen_rank ?? null) !== null ? `<span class="rank-pill">${g.frozen_rank}</span>` : '—';
    return `<tr>
      <td class="num">${g.rank ?? '—'}</td>
      <td>${g.away_team ?? '?'}</td><td class="num">${g.away_score ?? '–'}</td>
      <td>${g.home_team ?? '?'}</td><td class="num">${g.home_score ?? '–'}</td>
      <td class="${stCls}">${(g.status || '—').toUpperCase()}</td>
      <td>${fr}</td></tr>`;
  };

  let html = '';
  for (const w of WAVE_ORDER) {
    const wg = games.filter(g => detectWave(g.kickoff_at) === w);
    if (!wg.length) continue;
    const nF = wg.filter(g => gameStatusClass(g.status) === 'final').length;
    const nL = wg.filter(g => gameStatusClass(g.status) === 'live').length;
    const nS = wg.filter(g => gameStatusClass(g.status) === 'scheduled').length;
    const summary = nL ? `${nL} live` : nS && nF ? `${nF} final · ${nS} to play` : nS ? 'scheduled' : 'final';
    html += `<div class="wave-head ${w === activeWave ? 'active' : ''}">${w === activeWave ? '▶ ' : ''}${WAVE_LABEL[w]} <span>${summary}</span></div>`;
    html += `<table class="grid"><tbody>${wg.map(gameRow).join('')}</tbody></table>`;
  }
  el.innerHTML = html;
}

// ---- Leaderboard (the Ladder) ----
// Faithful to seasonStore.fetchSeasonLeaderboard:
//   startWeek = first season_games.week with kickoff_at >= pool_start_date (default 1)
//   season pts = SUM(week_points) for phase-scoped rows, week >= startWeek
//   week pts   = current week's week_points
async function renderLeaderboard() {
  const el = document.getElementById('leaderboard-view');
  if (!selectedPool) { el.innerHTML = `<div class="empty">No pool selected for ${selectedComp}.</div>`; return; }

  const currentWeek = cfg('current_week');
  const phase = String(cfg('current_phase', 'REGULAR'));
  const ws = String(cfg('week_state', 'idle'));
  const isPlayoffs = phase === 'PLAYOFFS' || phase === 'SUPERBOWL' || phase === 'SUPERBOWL_INTRO';
  const weekInProgress = ['locked', 'live', 'settling'].includes(ws);

  // 1) active members + pool start date
  const [membersRes, poolRes] = await Promise.all([
    sb.from('pool_members').select('user_id').eq('pool_id', selectedPool).eq('status', 'active'),
    sb.from('pools').select('pool_start_date').eq('id', selectedPool).single(),
  ]);
  if (membersRes.error) { el.innerHTML = `<div class="empty">${translateError(membersRes.error)}</div>`; return; }
  const memberIds = (membersRes.data || []).map(m => m.user_id);
  if (!memberIds.length) { el.innerHTML = `<div class="empty">No active members in this pool.</div>`; return; }

  // 2) derive startWeek from pool_start_date via the schedule
  let startWeek = 1;
  if (poolRes.data && poolRes.data.pool_start_date) {
    const { data: fg } = await sb.from('season_games').select('week')
      .eq('competition', selectedComp).gte('kickoff_at', poolRes.data.pool_start_date)
      .order('kickoff_at', { ascending: true }).limit(1).maybeSingle();
    if (fg && typeof fg.week === 'number') startWeek = fg.week;
  }

  // 3) per-week totals (phase-scoped), week >= startWeek
  let q = sb.from('season_user_totals')
    .select('user_id, week, week_points, is_hotpick_correct, phase')
    .eq('competition', selectedComp).in('user_id', memberIds).gte('week', startWeek);
  q = isPlayoffs ? q.neq('phase', 'REGULAR') : q.eq('phase', 'REGULAR');
  const { data: totals, error: tErr } = await q;
  if (tErr) { el.innerHTML = `<div class="empty">${translateError(tErr)}</div>`; return; }

  // 4) profiles for the member set ('*' tolerates is_test_account not existing
  //    yet — it lands as a Phase 2 migration; until then the TEST badge simply
  //    never shows.)
  const { data: profs, error: pErr } = await sb.from('profiles').select('*').in('id', memberIds);
  if (pErr) { el.innerHTML = `<div class="empty">${translateError(pErr)}</div>`; return; }
  const profById = {};
  for (const p of (profs || [])) profById[p.id] = p;

  // aggregate
  const agg = {};
  for (const id of memberIds) agg[id] = { user_id: id, season: 0, week: null, hp: null };
  for (const row of (totals || [])) {
    const a = agg[row.user_id]; if (!a) continue;
    if (!(weekInProgress && row.week === currentWeek)) a.season += (row.week_points || 0);
    if (row.week === currentWeek) { a.week = row.week_points; a.hp = row.is_hotpick_correct; }
  }
  const list = Object.values(agg).sort((x, y) => y.season - x.season);

  let rows = '';
  list.forEach((e, i) => {
    const p = profById[e.user_id] || {};
    const name = p.poolie_name || '(unknown)';
    const tail = p.first_name ? ` — ${p.first_name}${p.last_name ? ' ' + p.last_name[0] + '.' : ''}` : '';
    const testBadge = p.is_test_account === true ? `<span class="test-badge">TEST</span>` : '';
    const wk = e.week === null ? '—' : e.week;
    const wkCls = typeof e.week === 'number' ? (e.week >= 0 ? 'pos' : 'neg') : '';
    const seasonCls = e.season > 0 ? 'pos' : e.season < 0 ? 'neg' : '';
    let hp = '<span class="hp-pending">pending</span>';
    if (e.hp === true) hp = '<span class="hp-correct">correct</span>';
    else if (e.hp === false) hp = '<span class="hp-incorrect">incorrect</span>';
    rows += `<tr>
      <td class="num">${i + 1}</td>
      <td>${name}<span style="color:#8A97AA;">${tail}</span>${testBadge}</td>
      <td class="num ${wkCls}">${wk}</td>
      <td class="num ${seasonCls}">${e.season}</td>
      <td>${hp}</td></tr>`;
  });
  el.innerHTML = `<div style="font-size:10px;color:#8A97AA;margin-bottom:6px;">
      Season total from week ${startWeek}${weekInProgress ? ` · current week (W${currentWeek}) excluded while in progress` : ''}</div>
    <table class="grid"><thead><tr>
      <th>#</th><th>Player</th><th>Week Pts</th><th>Season Pts</th><th>HotPick</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}

function toggleAutoPick(cb) { autoPickBeforeStep = cb.checked; }

// Invoke sim-operator; normalise both transport errors and {success:false} bodies.
async function invokeOp(action, opts) {
  try {
    const body = { action, competition: selectedComp };
    if (opts && opts.target_week !== undefined) body.target_week = opts.target_week;
    if (opts && opts.targets !== undefined) body.targets = opts.targets;
    const { data, error } = await sb.functions.invoke('sim-operator', { body });
    if (error) {
      let msg = translateError(error);
      try { const ctx = await error.context.json(); if (ctx && ctx.error) msg = ctx.error; } catch (_) {}
      return { success: false, error: msg };
    }
    return data;
  } catch (e) { return { success: false, error: translateError(e) }; }
}

async function callSimOperator(action, opts = {}) {
  const comp = selectedComp;
  if (!isWritable(comp)) { log(`Refused: ${comp} is read-only`, 'error'); return; }

  // Reviewer-environment confirm — every write action, no "don't show again".
  if (REVIEWER_COMPS.includes(comp)) {
    const wk = cfg('current_week', '?');
    const ok = window.confirm(`⚠️ REVIEWER ENVIRONMENT\n\nYou are about to modify ${comp}.\nApp-store reviewers may be testing in this environment.\n\nAction: ${opts.label || action} (Week ${wk})\n\nCancel to abort, OK to proceed.`);
    if (!ok) { log(`Cancelled "${opts.label || action}" on ${comp}`, 'warn'); return; }
  }

  // Auto-pick before a step (spec §6a): skip on "already submitted", abort on any other error.
  if (opts.isStep && autoPickBeforeStep) {
    const ap = await invokeOp('auto_pick_tom', {});
    if (ap && ap.success) log(`Auto-picked ${ap.picks_submitted} games`, 'info');
    else if (ap && /already submitted/i.test(ap.error || '')) { /* fine — proceed */ }
    else { log(`Auto-pick failed: ${(ap && ap.error) || 'error'} — step aborted`, 'error'); return; }
  }

  const res = await invokeOp(action, opts);
  if (res && res.success) {
    log(`${opts.label || action} ✓${res.message ? ' — ' + res.message : ''}`, 'success');
    await refreshAll();
  } else {
    log(`${opts.label || action} failed: ${(res && res.error) || 'error'}`, 'error');
  }
}

function opStep() { callSimOperator('advance_week_state', { isStep: true, label: currentStepLabel() }); }
function opAutoPick() { callSimOperator('auto_pick_tom', { label: 'Auto-pick my picks' }); }

// What the next game-day sub-step will do, computed from the current games (the
// server is authoritative; this is for the button label only).
function gameDayNextLabel() {
  const g = lastGames || [];
  const liveWave = WAVE_ORDER.find(w => g.some(x => detectWave(x.kickoff_at) === w && gameStatusClass(x.status) === 'live'));
  if (liveWave) return `NEXT → final ${WAVE_LABEL[liveWave]}`;
  const schedWave = WAVE_ORDER.find(w => g.some(x => detectWave(x.kickoff_at) === w && gameStatusClass(x.status) === 'scheduled'));
  if (schedWave) return `NEXT → kickoff ${WAVE_LABEL[schedWave]}`;
  return 'NEXT → settle week';
}
// NEXT button: game-day waves during the live window, macro week_state otherwise.
function opNext() {
  const ws = String(cfg('week_state', 'idle'));
  if (ws === 'locked' || ws === 'live') {
    callSimOperator('advance_game_day', { label: gameDayNextLabel().replace('NEXT → ', '') });
  } else {
    opStep();

function opPhase() {
  const sel = document.getElementById('phase-next');

function opJump() {
  const t = parseInt(document.getElementById('jump-week').value, 10);
  const cur = cfg('current_week');
  if (!Number.isInteger(t) || t < 1 || t > 22) { log('Jump: week must be 1–22', 'error'); return; }
  if (typeof cur === 'number' && t <= cur) { log(`Jump: target must be greater than current week ${cur}`, 'error'); return; }
  const lo = typeof cur === 'number' ? cur + 1 : 1, hi = t - 1;
  const skipMsg = hi >= lo ? `Weeks ${lo}–${hi} will be skipped with neutral (0-pt) scores.` : 'No weeks skipped.';
  if (!window.confirm(`Jump to week ${t}?\n${skipMsg}\nThis cannot be undone.`)) return;
  callSimOperator('jump_to_week', { target_week: t, label: `Jump to week ${t}` });
}

        ${['win', 'lose', 'none'].map(o => `<option value="${o}" ${d.hotpick === o ? 'selected' : ''}>${o}</option>`).join('')}
      </select>
    </div>`;
  });
  h += `<div class="ctl-row" style="margin-top:8px;">
    <button class="ctl-btn" style="flex:1;margin:0;background:#26405f;" onclick="seedDefault()">Default spread</button>
    <button class="ctl-btn" style="flex:1;margin:0;" onclick="opSeedBots()">Seed Bots</button></div></div>`;
  return h;
}

async function opSeedBots() {
  const comp = selectedComp;
  if (comp !== SEED_BOTS_COMP) { log(`Seed Bots is locked to ${SEED_BOTS_COMP}`, 'error'); return; }
  const week = cfg('current_week', '?');
  const targets = {};
  const lines = [];
  SEED_BOTS_UI.forEach((b, i) => {
    const d = seedDraft[i] || { correct: 6, hotpick: 'win' };
    const correct = Math.max(0, Math.min(15, parseInt(d.correct, 10) || 0));
    targets[b.id] = { correct, hotpick: d.hotpick };
    lines.push(`${b.name}: ${correct} correct · HotPick ${d.hotpick}`);
  });
  if (!window.confirm(`Seed the 8 bots for ${comp} · Week ${week}?\n\n${lines.join('\n')}\n\nWrites picks only (the scorer makes points on Complete). Bots that already have picks are skipped.`)) {
    log('Seed Bots cancelled', 'warn'); return;
  }
  const res = await invokeOp('seed_bots', { targets });
  if (res && res.success) {
    log(`Seed Bots ✓ — ${res.message}`, 'success');
    (res.seeded || []).forEach(s => {
      const clamp = (s.requested_correct != null && s.requested_correct !== s.correct) ? ` (requested ${s.requested_correct}, clamped)` : '';
      log(`  • ${s.name}: ${s.correct} correct + HotPick ${s.hotpick} → ${s.expected_points} pts${clamp}`, 'info');
    });
    (res.skipped || []).forEach(s => log(`  • ${s.name}: skipped (${s.reason})`, 'warn'));
    await refreshAll();
  } else {
    log(`Seed Bots failed: ${(res && res.error) || 'error'}`, 'error');
  }
}

function opReset() {
  const comp = selectedComp;
  const typed = window.prompt(`This will DELETE all picks and scores for ${comp} and reset it to OFF_SEASON week 1.\nThis cannot be undone.\n\nType RESET to confirm:`);
  if (typed !== 'RESET') { if (typed !== null) log('Reset cancelled — confirmation text did not match', 'warn'); return; }
  callSimOperator('reset_to_off_season', { label: 'Reset to Off Season' });
}

// Copy log
document.getElementById('copy-log').addEventListener('click', () => {
  const lines = [...document.getElementById('log-body').children]
    .reverse()
    .map(e => `${e.querySelector('.log-time').textContent} ${e.querySelector('.log-msg').textContent}`)
    .join('\n');
  navigator.clipboard.writeText(lines).then(() => log('Log copied to clipboard', 'info'));
});
</script>
